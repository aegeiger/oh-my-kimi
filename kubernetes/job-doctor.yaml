apiVersion: batch/v1
kind: Job
metadata:
  name: oh-my-kimi-doctor
  namespace: oh-my-kimi
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 300
  template:
    spec:
      containers:
      - name: oh-my-kimi
        image: quay.io/aicatalyst/oh-my-kimi:latest
        imagePullPolicy: Always
        command: ["node", "dist/cli.js"]
        args: ["doctor", "--soft"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      restartPolicy: Never
