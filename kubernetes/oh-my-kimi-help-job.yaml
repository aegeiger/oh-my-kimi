apiVersion: batch/v1
kind: Job
metadata:
  name: oh-my-kimi-help-job
  namespace: oh-my-kimi
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 10
  template:
    spec:
      containers:
      - name: oh-my-kimi-cli
        image: quay.io/aicatalyst/oh-my-kimi-oh-my-kimi-cli:latest
        imagePullPolicy: IfNotPresent
        command: ["omk", "--help"]
        resources:
          requests:
            memory: 256Mi
            cpu: 250m
          limits:
            memory: 512Mi
            cpu: 500m
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
      restartPolicy: Never