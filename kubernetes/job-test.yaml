apiVersion: batch/v1
kind: Job
metadata:
  name: oh-my-kimi-test
  namespace: oh-my-kimi
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  template:
    spec:
      containers:
      - name: oh-my-kimi
        image: quay.io/aicatalyst/oh-my-kimi:latest
        imagePullPolicy: Always
        command: ["npm", "test"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
      restartPolicy: Never
